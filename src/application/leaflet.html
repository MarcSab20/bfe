<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Carte Interactive - Gestion des Stagiaires</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" 
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" 
          crossorigin=""/>
    
    <!-- Leaflet JavaScript -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" 
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" 
            crossorigin=""></script>
    
    <style>
        body {
            padding: 0;
            margin: 0;
        }
        
        #map {
            height: 100vh;
            width: 100%;
        }
        
        .custom-popup {
            font-family: Arial, sans-serif;
            font-size: 13px;
        }
        
        .custom-popup b {
            font-size: 14px;
            color: #2c3e50;
        }
        
        /* Styles pour les différents types de marqueurs */
        .marker-ecole-professionnelle {
            background-color: #27ae60;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 3px solid white;
        }
        
        .marker-ecole-academique {
            background-color: #f39c12;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 3px solid white;
        }
        
        .marker-stagiaire {
            background-color: #3498db;
            width: 15px;
            height: 15px;
            border-radius: 50%;
            border: 2px solid white;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    
    <script>
        // Initialiser la carte centrée sur le Cameroun
        var map = L.map('map').setView([7.3697, 12.3547], 6);
        
        // Ajouter le fond de carte OpenStreetMap
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
            maxZoom: 18,
            minZoom: 2
        }).addTo(map);
        
        // Groupe de marqueurs pour faciliter la gestion
        var markersLayer = L.layerGroup().addTo(map);
        
        // Couleurs pour les différents types de marqueurs
        var markerColors = {
            'green': '#27ae60',    // Écoles professionnelles
            'orange': '#f39c12',   // Écoles académiques
            'purple': '#9b59b6',   // Écoles partenaires
            'blue': '#3498db',     // Stagiaires
            'red': '#e74c3c'       // Par défaut
        };
        
        // Fonction pour créer une icône personnalisée
        function createCustomIcon(color) {
            return L.divIcon({
                className: 'custom-marker',
                html: '<div style="background-color: ' + markerColors[color] + 
                      '; width: 20px; height: 20px; border-radius: 50%; border: 3px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.3);"></div>',
                iconSize: [20, 20],
                iconAnchor: [10, 10],
                popupAnchor: [0, -10]
            });
        }
        
        // Fonction appelée par Java pour ajouter un marqueur
        function addMarker(lat, lng, titre, infobulle, couleur, type, id) {
            var icon = createCustomIcon(couleur);
            
            var marker = L.marker([lat, lng], {icon: icon})
                .bindPopup('<div class="custom-popup">' + infobulle + '</div>')
                .addTo(markersLayer);
            
            // Stocker les informations dans le marqueur
            marker.markerType = type;
            marker.markerId = id;
            
            // Événement au clic sur le marqueur
            marker.on('click', function(e) {
                // Appeler la fonction Java via le bridge
                if (typeof javaApp !== 'undefined') {
                    javaApp.onMarkerClick(type, id);
                }
            });
            
            // Événement au survol (tooltip)
            marker.bindTooltip(titre, {
                permanent: false,
                direction: 'top',
                offset: [0, -10]
            });
            
            return marker;
        }
        
        // Fonction pour supprimer tous les marqueurs
        function clearMarkers() {
            markersLayer.clearLayers();
        }
        
        // Fonction pour centrer la carte sur une position
        function centerMap(lat, lng, zoom) {
            map.setView([lat, lng], zoom);
        }
        
        // Fonction pour zoomer sur une zone
        function fitBounds(southLat, westLng, northLat, eastLng) {
            var bounds = [[southLat, westLng], [northLat, eastLng]];
            map.fitBounds(bounds);
        }
        
        // Fonction pour zoomer sur le Cameroun
        function zoomCameroun() {
            centerMap(7.3697, 12.3547, 7);
        }
        
        // Fonction pour zoomer sur l'Afrique
        function zoomAfrique() {
            centerMap(0, 20, 3);
        }
        
        // Fonction pour zoomer sur le monde
        function zoomMonde() {
            centerMap(20, 0, 2);
        }
        
        // Fonction pour compter les marqueurs visibles
        function countMarkers() {
            var count = 0;
            markersLayer.eachLayer(function(layer) {
                count++;
            });
            return count;
        }
        
        // Fonction pour obtenir tous les marqueurs d'un type
        function getMarkersByType(type) {
            var markers = [];
            markersLayer.eachLayer(function(layer) {
                if (layer.markerType === type) {
                    markers.push({
                        id: layer.markerId,
                        lat: layer.getLatLng().lat,
                        lng: layer.getLatLng().lng
                    });
                }
            });
            return markers;
        }
        
        // Ajouter des contrôles de zoom personnalisés
        var zoomControl = L.control({position: 'topright'});
        zoomControl.onAdd = function(map) {
            var div = L.DomUtil.create('div', 'zoom-control');
            div.innerHTML = '<div style="background: white; padding: 10px; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.2);">' +
                '<button onclick="zoomMonde()" style="display: block; width: 100%; margin: 5px 0; padding: 8px; cursor: pointer; border: 1px solid #ccc; border-radius: 3px; background: white;">🌍 Monde</button>' +
                '<button onclick="zoomAfrique()" style="display: block; width: 100%; margin: 5px 0; padding: 8px; cursor: pointer; border: 1px solid #ccc; border-radius: 3px; background: white;">🌍 Afrique</button>' +
                '<button onclick="zoomCameroun()" style="display: block; width: 100%; margin: 5px 0; padding: 8px; cursor: pointer; border: 1px solid #ccc; border-radius: 3px; background: white;">📍 Cameroun</button>' +
                '</div>';
            return div;
        };
        zoomControl.addTo(map);
        
        // Ajouter une légende
        var legend = L.control({position: 'bottomleft'});
        legend.onAdd = function(map) {
            var div = L.DomUtil.create('div', 'legend');
            div.innerHTML = '<div style="background: white; padding: 10px; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.2);">' +
                '<div style="font-weight: bold; margin-bottom: 5px;">Légende</div>' +
                '<div style="margin: 3px 0;"><span style="display: inline-block; width: 15px; height: 15px; border-radius: 50%; background-color: ' + markerColors['green'] + '; margin-right: 5px;"></span> Écoles Professionnelles</div>' +
                '<div style="margin: 3px 0;"><span style="display: inline-block; width: 15px; height: 15px; border-radius: 50%; background-color: ' + markerColors['orange'] + '; margin-right: 5px;"></span> Écoles Académiques</div>' +
                '<div style="margin: 3px 0;"><span style="display: inline-block; width: 15px; height: 15px; border-radius: 50%; background-color: ' + markerColors['purple'] + '; margin-right: 5px;"></span> Écoles Partenaires</div>' +
                '<div style="margin: 3px 0;"><span style="display: inline-block; width: 15px; height: 15px; border-radius: 50%; background-color: ' + markerColors['blue'] + '; margin-right: 5px;"></span> Stagiaires</div>' +
                '</div>';
            return div;
        };
        legend.addTo(map);
        
        // Message de chargement initial
        console.log('Carte Leaflet initialisée avec succès');
        
        // Notifier Java que la carte est prête
        if (typeof javaApp !== 'undefined') {
            console.log('Bridge Java-JavaScript établi');
        }
    </script>
</body>
</html>
